name: publicar

# Dispara quando você envia uma tag começando com "v" (ex: v1.2.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  publicar-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache do Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Instalar dependências do frontend
        run: npm install

      - name: Buildar, assinar e publicar
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CredHub ${{ github.ref_name }}'
          releaseBody: 'Nova versão do CredHub. O aplicativo será atualizado automaticamente.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
